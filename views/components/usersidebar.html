<div class="usersidebar">
    <a href="/currency" hx-get="/currency" hx-target="body" hx-push-url="true" class="sidebarbutton sidebtn-vert">
        <img src="/static/useful/icons/vertice.png" class="sidebaricon" alt="Vertice">
        <span class="navtext">99K</span>
    </a>

    <a href="/currency" hx-get="/currency" hx-target="body" hx-push-url="true" class="sidebarbutton sidebtn-tix">
        <img src="/static/useful/icons/tix.png" class="sidebaricon" alt="Tix">
        <span class="navtext">99K</span>
    </a>

    <div class="navbardivider sidebardiv"></div>

    <a href="/messages" hx-get="/messages" hx-target="body" hx-push-url="true" class="sidebarbutton sidebtn-msg">
        <img src="/static/useful/icons/messages.png" class="sidebaricon" alt="Messages">
        <span class="navtext">99</span>
    </a>

    <a href="/friends" hx-get="/friends" hx-target="body" hx-push-url="true" class="sidebarbutton sidebtn-frnd">
        <img src="/static/useful/icons/friends.png" class="sidebaricon" alt="Friends">
        <span class="navtext">99</span>
    </a>

    <button class="sidebarpfpbutton sidebtn-pfp" onclick="toggleDropdown(event)">
        <img src="/static/useful/temp/pfp.png" class="sidebarpfp" alt="set this to player id in the future / username">
    </button>

    <div id="userDropdown" class="userdropdown">
        <span class="dropdownuser"><a href="/profile" hx-get="/profile" hx-target="body" hx-push-url="true" class="dropdownitem">{{.Username}}</a></span>
        <div class="dropdownline"></div>
        <a href="/avatar" hx-get="/avatar" hx-target="body" hx-push-url="true" class="dropdownitem">Avatar</a>
        <a href="/create" hx-get="/create" hx-target="body" hx-push-url="true" class="dropdownitem">Create ...</a>
        <a href="/redeem" hx-get="/redeem" hx-target="body" hx-push-url="true" class="dropdownitem">Redeem</a>
        <a href="/settings" hx-get="/settings" hx-target="body" hx-push-url="true" class="dropdownitem">Settings</a>
        <a href="/admin" hx-get="/admin" hx-target="body" hx-push-url="true" class="dropdownitem">Admin</a>
        <a href="/logout" hx-get="/logout" hx-target="body" hx-push-url="true" class="dropdownitem dropdownlogout">Log out</a>
    </div>
</div>

<script>
    function toggleDropdown(event) {
        event.stopPropagation();
        const dropdown = document.getElementById('userDropdown');
        dropdown.classList.toggle('active');
    }
    document.addEventListener('click', function(event) {
        const dropdown = document.getElementById('userDropdown');
        if (dropdown && dropdown.classList.contains('active')) {
            const pfpButton = document.querySelector('.sidebarpfpbutton');
            if (!dropdown.contains(event.target) && !pfpButton.contains(event.target)) {
                dropdown.classList.remove('active');
            }
        }
    });
</script>
